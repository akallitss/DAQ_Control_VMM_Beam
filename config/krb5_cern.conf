# Minimal Kerberos config for CERN.CH, used by backup_watcher's kinit on the
# DAQ machine (which has no system-wide CERN realm config). Point KRB5_CONFIG
# at this file when launching anything that needs CERN Kerberos:
#   KRB5_CONFIG=config/krb5_cern.conf kinit akallits@CERN.CH
[libdefaults]
    default_realm = CERN.CH
    dns_lookup_realm = false
    dns_lookup_kdc = true
    ticket_lifetime = 25h
    renew_lifetime = 120h
    forwardable = true

[realms]
    CERN.CH = {
        default_domain = cern.ch
        kpasswd_server = cerndc.cern.ch
        admin_server = cerndc.cern.ch
        kdc = cerndc.cern.ch
    }

[domain_realm]
    .cern.ch = CERN.CH
    cern.ch = CERN.CH
