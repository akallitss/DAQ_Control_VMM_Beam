<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VMM SPS DAQ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='xterm.css') }}">
    <script src="{{ url_for('static', filename='xterm.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='socket.io.min.js') }}"></script>
    <style>
        :root {
            --bg:      #0e1116;
            --panel:   #151a21;
            --panel-2: #1b222b;
            --border:  #262f3a;
            --text:    #e2e8f0;
            --muted:   #8b96a5;
            --accent:  #39c5b2;
            --ok:      #3ddc84;
            --warn:    #f0c040;
            --bad:     #ef5b5b;
            --info:    #4dabe8;
            --sec:     #7d8896;
            --mono:    ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        }

        html { scrollbar-color: #333c48 var(--bg); }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 0.925rem;
        }

        /* ---------- Top bar ---------- */
        .topbar {
            background: #12161c;
            border-bottom: 1px solid var(--border);
            padding: 0.3rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.04em;
            color: var(--text) !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .brand-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            display: inline-block;
        }
        .brand-sub { color: var(--muted); font-weight: 400; font-size: 0.78em; }
        .main-tabs { border-bottom: none; flex-wrap: nowrap; overflow-x: auto; max-width: 100%; }
        .main-tabs .nav-link {
            color: var(--muted);
            border: none;
            border-bottom: 2px solid transparent;
            background: transparent;
            padding: 0.5rem 0.9rem;
            white-space: nowrap;
            font-weight: 500;
        }
        .main-tabs .nav-link:hover { color: var(--text); }
        .main-tabs .nav-link.active {
            color: var(--accent);
            background: transparent;
            border-bottom: 2px solid var(--accent);
        }

        .page-content { padding: 1.1rem 1.4rem 2rem; }
        @media (max-width: 576px) { .page-content { padding: 0.75rem 0.75rem 1.5rem; } }

        /* ---------- Panels ---------- */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            padding: 0.55rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        .panel-title {
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--muted);
        }
        .panel-header-note { color: var(--muted); font-size: 0.78rem; opacity: 0.85; }
        .panel-body { padding: 0.9rem 1rem; }

        /* ---------- Buttons / forms ---------- */
        .btn { border-radius: 7px; font-weight: 500; }
        .btn:focus { box-shadow: none; }
        .form-select, .form-control {
            background-color: var(--panel-2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .form-select:focus, .form-control:focus {
            background-color: var(--panel-2);
            color: var(--text);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(57, 197, 178, 0.18);
        }
        .form-label { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.25rem; }
        .text-muted { color: var(--muted) !important; }
        hr { border-color: var(--border); opacity: 1; }

        .group-label {
            display: block;
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            margin-bottom: 0.4rem;
        }
        .btn-group-block { margin-bottom: 0.9rem; }
        .btn-group-block:last-child { margin-bottom: 0; }

        /* ---------- Run stats ---------- */
        .run-stats { display: flex; gap: 2.2rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .stat-label {
            color: var(--muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .stat-value {
            font-family: var(--mono);
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--accent);
            line-height: 1.25;
            word-break: break-all;
        }
        /* Current run / Events this run: green while a run is live, blue when complete. */
        .stat-value.run-live { color: var(--ok); }
        .stat-value.run-done { color: var(--info); }

        /* ---------- Status cards ---------- */
        .status-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-left: 3px solid var(--sec);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            height: 100%;
        }
        .status-card .status-name { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.03em; }
        .status-card .status-state { font-weight: 600; font-size: 1.15rem; }
        .status-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .status-fields {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.95rem;
            font-family: var(--mono);
        }
        .status-field { display: flex; justify-content: space-between; gap: 1rem; }
        .status-field span:first-child { color: var(--muted); }
        .s-success   { border-left-color: var(--ok);   } .s-success .status-state   { color: var(--ok); }
        .s-warning   { border-left-color: var(--warn); } .s-warning .status-state   { color: var(--warn); }
        .s-danger    { border-left-color: var(--bad);  } .s-danger .status-state    { color: var(--bad); }
        .s-info      { border-left-color: var(--info); } .s-info .status-state      { color: var(--info); }
        .s-secondary { border-left-color: var(--sec);  } .s-secondary .status-state { color: var(--sec); }

        /* ---------- System resource monitor ---------- */
        #sys-load-avg { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }
        #sys-cpu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px 18px;
            margin-bottom: 0.6rem;
            font-family: var(--mono);
        }
        .sys-rows {
            border-top: 1px solid var(--border);
            padding-top: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 3px;
            font-family: var(--mono);
        }
        .sys-bar-row { display: flex; align-items: center; font-size: 0.75rem; line-height: 18px; }
        .sys-bar-label { color: var(--muted); width: 44px; text-align: right; padding-right: 6px; flex-shrink: 0; }
        .sys-bar-track {
            flex: 1;
            background: #10141a;
            border: 1px solid #232b35;
            border-radius: 2px;
            height: 11px;
            position: relative;
            min-width: 50px;
            overflow: hidden;
        }
        .sys-bar-fill { position: absolute; inset: 0; transition: width 0.6s ease; }
        .sys-bar-pct { color: var(--muted); margin-left: 7px; min-width: 44px; flex-shrink: 0; }
        .sys-bar-extra { color: #5c6774; margin-left: 5px; }

        /* ---------- Monitoring strip ---------- */
        .monitor-strip .strip-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            padding: 0.45rem 0.9rem;
        }
        .strip-label {
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }
        .monitor-strip .collapse-body {
            padding: 0.5rem 0.9rem 0.7rem;
            border-top: 1px solid var(--border);
        }

        /* ---------- Plot galleries ---------- */
        .plot-card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px;
            height: 100%;
            transition: border-color 0.15s;
        }
        .plot-card:hover { border-color: var(--accent); }
        .plot-card img {
            width: 100%;
            object-fit: contain;
            cursor: pointer;
            display: block;
            border-radius: 4px;
        }

        /* ---------- Beam state chip ---------- */
        .beam-chip {
            font-family: var(--mono);
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            padding: 0.12rem 0.6rem;
            border-radius: 6px;
            white-space: nowrap;
        }
        .beam-on      { color: var(--ok);   border: 1px solid var(--ok);   background: rgba(61, 220, 132, 0.12); }
        .beam-off     { color: var(--bad);  border: 1px solid var(--bad);  background: rgba(239, 91, 91, 0.14); }
        .beam-unknown { color: var(--sec);  border: 1px solid var(--sec);  background: rgba(125, 136, 150, 0.12); }

        /* ---------- Breadcrumb / tables ---------- */
        .breadcrumb { background: transparent; padding: 0; margin: 0; }
        .breadcrumb-item a { color: var(--muted); text-decoration: none; }
        .breadcrumb-item a:hover { color: var(--accent); }
        .breadcrumb-item.active { color: var(--text); }
        .breadcrumb-item + .breadcrumb-item::before { color: #4a5462; }
        .table-dark { --bs-table-bg: var(--panel-2); border-color: var(--border); }
    </style>
</head>
<body>
    <nav class="topbar navbar navbar-expand navbar-dark sticky-top">
        <div class="container-fluid flex-wrap">
            <a class="navbar-brand" href="#">
                <span class="brand-dot"></span>P2 VMM DAQ
                <span class="brand-sub">SPS</span>
            </a>
            <ul class="nav nav-tabs main-tabs ms-2" id="daqTabs">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#overview">Overview</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#png-viewer">Online QA</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#analysis-browser">Analysis</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="tab-content page-content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
